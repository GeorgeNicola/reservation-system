worker_processes auto;

events {
    worker_connections 1024;
}

http {
    upstream reservation_backend {
        server backend-1:8000;
        server backend-2:8000;
    }

    log_format main '$remote_addr - $host [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent" upstream="$upstream_addr"';

    access_log /var/log/nginx/access.log main;
    error_log  /var/log/nginx/error.log warn;

    server {
        listen 80;
        server_name _;

        client_max_body_size 1m;
        keepalive_timeout 65;

        location / {
            proxy_pass http://reservation_backend;

            proxy_set_header Host              $host;
            proxy_set_header X-Real-IP         $remote_addr;
            proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            # Expose which upstream instance handled the request
            add_header X-Upstream-Instance $upstream_addr always;

            proxy_connect_timeout 5s;
            proxy_send_timeout    30s;
            proxy_read_timeout    30s;
        }
    }
}
