<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>K6 Load Test Results — Concurrency Control Comparison</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <style>
      :root {
        --naive: #ef4444;
        --pessimistic: #3b82f6;
        --distributed: #f59e0b;
        --queued: #10b981;
        --bg: #0f172a;
        --card: #1e293b;
        --text: #e2e8f0;
        --muted: #94a3b8;
        --border: #334155;
      }
      * { margin: 0; padding: 0; box-sizing: border-box; }
      body {
        font-family: "Inter", -apple-system, sans-serif;
        background: var(--bg);
        color: var(--text);
        padding: 30px 20px;
        line-height: 1.6;
      }
      .header { text-align: center; margin-bottom: 40px; }
      .header h1 {
        font-size: 28px;
        font-weight: 700;
        background: linear-gradient(135deg, #60a5fa, #a78bfa);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        margin-bottom: 8px;
      }
      .header p { color: var(--muted); font-size: 14px; }
      .header .generated-at { color: var(--border); font-size: 12px; margin-top: 4px; }

      .loading {
        text-align: center;
        padding: 60px 20px;
        color: var(--muted);
        font-size: 18px;
      }
      .loading .spinner {
        display: inline-block;
        width: 40px; height: 40px;
        border: 3px solid var(--border);
        border-top-color: #60a5fa;
        border-radius: 50%;
        animation: spin 0.8s linear infinite;
        margin-bottom: 16px;
      }
      @keyframes spin { to { transform: rotate(360deg); } }

      .error-msg {
        text-align: center;
        padding: 40px;
        color: var(--naive);
        background: var(--card);
        border-radius: 12px;
        max-width: 600px;
        margin: 40px auto;
      }
      .error-msg code {
        display: block;
        margin-top: 12px;
        padding: 12px;
        background: var(--bg);
        border-radius: 8px;
        font-size: 13px;
        color: var(--muted);
      }

      .summary-grid {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
        gap: 16px;
        max-width: 1100px;
        margin: 0 auto 40px auto;
      }
      .summary-card {
        background: var(--card);
        border-radius: 12px;
        padding: 20px;
        border-left: 4px solid;
      }
      .summary-card.naive { border-color: var(--naive); }
      .summary-card.pessimistic { border-color: var(--pessimistic); }
      .summary-card.distributed { border-color: var(--distributed); }
      .summary-card.queued { border-color: var(--queued); }
      .summary-card h3 {
        font-size: 14px;
        font-weight: 600;
        text-transform: uppercase;
        letter-spacing: 0.5px;
        margin-bottom: 12px;
      }
      .summary-card.naive h3 { color: var(--naive); }
      .summary-card.pessimistic h3 { color: var(--pessimistic); }
      .summary-card.distributed h3 { color: var(--distributed); }
      .summary-card.queued h3 { color: var(--queued); }
      .stat-row {
        display: flex;
        justify-content: space-between;
        font-size: 13px;
        padding: 3px 0;
        border-bottom: 1px solid var(--border);
      }
      .stat-row:last-child { border-bottom: none; }
      .stat-label { color: var(--muted); }
      .stat-value { font-weight: 600; font-variant-numeric: tabular-nums; }

      .summary-table-container {
        max-width: 1100px;
        margin: 0 auto 40px auto;
        overflow-x: auto;
      }
      table {
        width: 100%;
        border-collapse: collapse;
        background: var(--card);
        border-radius: 12px;
        overflow: hidden;
        font-size: 14px;
      }
      th, td { padding: 12px 16px; text-align: right; }
      th:first-child, td:first-child { text-align: left; }
      th {
        background: #0f172a;
        color: var(--muted);
        font-weight: 600;
        text-transform: uppercase;
        font-size: 11px;
        letter-spacing: 0.5px;
      }
      td { border-top: 1px solid var(--border); font-variant-numeric: tabular-nums; }
      tr:hover td { background: rgba(255,255,255,0.03); }

      .chart-container {
        width: 95%;
        max-width: 1100px;
        margin: 20px auto;
        background: var(--card);
        padding: 24px;
        border-radius: 12px;
        border: 1px solid var(--border);
      }
      .section-title {
        text-align: center;
        font-size: 18px;
        font-weight: 600;
        color: var(--muted);
        margin: 40px 0 16px 0;
        text-transform: uppercase;
        letter-spacing: 1px;
      }

      #app { display: none; }
    </style>
  </head>
  <body>
    <!-- Loading state -->
    <div id="loading" class="loading">
      <div class="spinner"></div>
      <div>Loading test results...</div>
    </div>

    <!-- Error state -->
    <div id="error" class="error-msg" style="display: none;"></div>

    <!-- Main app (hidden until data loads) -->
    <div id="app">
      <div class="header">
        <h1>Concurrency Control Strategies — Load Test Results</h1>
        <p id="config-line"></p>
        <p class="generated-at" id="generated-at"></p>
      </div>

      <!-- Summary Cards -->
      <div class="summary-grid" id="summary-cards"></div>

      <!-- Comparison Table -->
      <div class="summary-table-container">
        <table id="summary-table"></table>
      </div>

      <!-- Charts -->
      <div class="section-title">Time-Series Charts</div>

      <div class="chart-container"><canvas id="throughputChart"></canvas></div>
      <div class="chart-container"><canvas id="latencyChart"></canvas></div>
      <div class="chart-container"><canvas id="p95Chart"></canvas></div>
      <div class="chart-container"><canvas id="statusChart"></canvas></div>
    </div>

    <script>
      const SCENARIO_META = {
        hot_spot_naive:       { label: "NAIVE",       color: "#ef4444", cssClass: "naive" },
        hot_spot_pessimistic: { label: "PESSIMISTIC", color: "#3b82f6", cssClass: "pessimistic" },
        hot_spot_distributed: { label: "DISTRIBUTED", color: "#f59e0b", cssClass: "distributed" },
        hot_spot_queued:      { label: "QUEUED",      color: "#10b981", cssClass: "queued" },
      };

      async function loadData() {
        try {
          const res = await fetch("results-processed.json");
          if (!res.ok) throw new Error(`HTTP ${res.status} — ${res.statusText}`);
          return await res.json();
        } catch (err) {
          throw new Error(
            `Could not load results-processed.json.\n\n` +
            `Make sure you have run:\n  node generate-graphs.js\n\n` +
            `Error: ${err.message}`
          );
        }
      }

      function renderSummaryCards(summary) {
        const container = document.getElementById("summary-cards");
        container.innerHTML = Object.entries(summary)
          .map(([name, s]) => {
            const icon = name === "naive" ? "⚠️" : "✅";
            const statusStr = Object.entries(s.statusCodes)
              .map(([k, v]) => `${k}:${v.toLocaleString()}`)
              .join(" ");
            return `
              <div class="summary-card ${name}">
                <h3>${icon} ${name}</h3>
                <div class="stat-row"><span class="stat-label">Total Requests</span><span class="stat-value">${Number(s.totalRequests).toLocaleString()}</span></div>
                <div class="stat-row"><span class="stat-label">Throughput</span><span class="stat-value">~${s.throughput} req/s</span></div>
                <div class="stat-row"><span class="stat-label">Avg Latency</span><span class="stat-value">${s.avgLatency} ms</span></div>
                <div class="stat-row"><span class="stat-label">p95 Latency</span><span class="stat-value">${s.p95Latency} ms</span></div>
                <div class="stat-row"><span class="stat-label">Max Latency</span><span class="stat-value">${s.maxLatency} ms</span></div>
                <div class="stat-row"><span class="stat-label">Status Codes</span><span class="stat-value">${statusStr}</span></div>
              </div>`;
          })
          .join("");
      }

      function renderTable(summary) {
        const names = Object.keys(summary);
        const vals = Object.values(summary);
        const table = document.getElementById("summary-table");

        const metrics = [
          { label: "Total Requests",      fn: s => Number(s.totalRequests).toLocaleString() },
          { label: "Throughput (req/s)",   fn: s => `~${s.throughput}` },
          { label: "Avg Latency (ms)",     fn: s => s.avgLatency },
          { label: "Median Latency (ms)",  fn: s => s.medianLatency },
          { label: "p95 Latency (ms)",     fn: s => s.p95Latency },
          { label: "p99 Latency (ms)",     fn: s => s.p99Latency },
          { label: "Min Latency (ms)",     fn: s => s.minLatency },
          { label: "Max Latency (ms)",     fn: s => s.maxLatency },
          { label: "Status Codes",         fn: s => Object.entries(s.statusCodes).map(([k,v]) => `<strong>${k}</strong>:${v.toLocaleString()}`).join(" ") },
        ];

        table.innerHTML = `
          <thead>
            <tr>
              <th>Metric</th>
              ${names.map(n => `<th>${n.toUpperCase()}</th>`).join("")}
            </tr>
          </thead>
          <tbody>
            ${metrics.map(m => `
              <tr>
                <td>${m.label}</td>
                ${vals.map(s => `<td>${m.fn(s)}</td>`).join("")}
              </tr>
            `).join("")}
          </tbody>`;
      }

      function makeDatasets(data, metricKey) {
        return Object.keys(data).map(s => ({
          label: SCENARIO_META[s]?.label || s,
          data: data[s][metricKey],
          borderColor: SCENARIO_META[s]?.color || "#888",
          backgroundColor: (SCENARIO_META[s]?.color || "#888") + "20",
          borderWidth: 2.5,
          pointRadius: 0,
          tension: 0.3,
          fill: false,
        }));
      }

      function makeChart(id, title, yLabel, data, metricKey) {
        const labels = Array.from({ length: 36 }, (_, i) => i + "s");
        new Chart(document.getElementById(id), {
          type: "line",
          data: { labels, datasets: makeDatasets(data, metricKey) },
          options: {
            responsive: true,
            interaction: { mode: "index", intersect: false },
            plugins: {
              title: { display: true, text: title, font: { size: 16, weight: "600" }, color: "#e2e8f0" },
              legend: { labels: { usePointStyle: true, padding: 20 } },
            },
            scales: {
              x: { title: { display: true, text: "Time (seconds from scenario start)" } },
              y: { beginAtZero: true, title: { display: true, text: yLabel } },
            },
          },
        });
      }

      function makeStatusChart(data) {
        const scenarios = Object.keys(data);
        const labels = scenarios.map(s => SCENARIO_META[s]?.label || s);

        const codeConfig = [
          { key: "status201", label: "201 Created",  color: "#22c55e" },
          { key: "status202", label: "202 Accepted", color: "#3b82f6" },
          { key: "status409", label: "409 Conflict", color: "#f59e0b" },
          { key: "status503", label: "503 Busy",     color: "#ef4444" },
        ];

        const datasets = codeConfig.map(c => ({
          label: c.label,
          data: scenarios.map(s => data[s][c.key].reduce((a, b) => a + b, 0)),
          backgroundColor: c.color,
          borderWidth: 0,
          borderRadius: 4,
        }));

        new Chart(document.getElementById("statusChart"), {
          type: "bar",
          data: { labels, datasets },
          options: {
            responsive: true,
            plugins: {
              title: { display: true, text: "HTTP Status Code Distribution", font: { size: 16, weight: "600" }, color: "#e2e8f0" },
              legend: { labels: { usePointStyle: true, padding: 20 } },
            },
            scales: {
              x: { stacked: true },
              y: { stacked: true, beginAtZero: true, title: { display: true, text: "Total Requests" } },
            },
          },
        });
      }

      // ─── Main ──────────────────────────────────────────────────────────
      (async function main() {
        const loadingEl = document.getElementById("loading");
        const errorEl = document.getElementById("error");
        const appEl = document.getElementById("app");

        try {
          const result = await loadData();

          // Set header info
          document.getElementById("config-line").textContent =
            `${result.config.vus} Virtual Users × ${result.config.durationPerScenario} per scenario | Hot spot: ${result.config.hotSpot}`;
          document.getElementById("generated-at").textContent =
            `Data processed at: ${new Date(result.generatedAt).toLocaleString()}`;

          // Render summary
          renderSummaryCards(result.summary);
          renderTable(result.summary);

          // Render charts
          Chart.defaults.color = "#94a3b8";
          Chart.defaults.borderColor = "#334155";

          makeChart("throughputChart", "Throughput Over Time", "Requests / Second", result.timeSeries, "throughput");
          makeChart("latencyChart", "Average Latency Over Time", "Latency (ms)", result.timeSeries, "latency");
          makeChart("p95Chart", "p95 Latency Over Time", "p95 Latency (ms)", result.timeSeries, "p95");
          makeStatusChart(result.timeSeries);

          // Show app, hide loading
          loadingEl.style.display = "none";
          appEl.style.display = "block";
        } catch (err) {
          loadingEl.style.display = "none";
          errorEl.style.display = "block";
          errorEl.innerHTML = `
            <h2>⚠️ Could not load results</h2>
            <p style="margin-top:12px; color: var(--muted);">Make sure you have generated the processed data first:</p>
            <code>node generate-graphs.js</code>
            <p style="margin-top:12px; color: var(--muted); font-size: 13px;">${err.message}</p>
          `;
        }
      })();
    </script>
  </body>
</html>
